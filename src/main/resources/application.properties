# ============================================================
# APPLICATION CONFIGURATION
# ============================================================
spring.application.name=employee-management

# Server Port
server.port=8080

# ============================================================
# MYSQL DATABASE CONFIGURATION
# ============================================================
spring.datasource.url=jdbc:mysql://localhost:3306/employee_management?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password="you can use accordingly(but i have my own password but i can't revel here"
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================================
# JPA / HIBERNATE CONFIGURATION
# ============================================================
# update  -> auto-updates schema on changes (use 'validate' or 'none' in production)
# create  -> drops and recreates schema on startup
# create-drop -> creates schema on startup, drops on shutdown
spring.jpa.hibernate.ddl-auto=update

# Show SQL in console (set to false in production)
spring.jpa.show-sql=true

# Format SQL for readability
spring.jpa.properties.hibernate.format_sql=true

# MySQL dialect (Spring Boot 3 auto-detects, but explicit is safer)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ============================================================
# JACKSON (JSON) CONFIGURATION
# ============================================================
# Return null fields in JSON response
spring.jackson.default-property-inclusion=always

# Pretty print JSON responses
spring.jackson.serialization.indent-output=true
